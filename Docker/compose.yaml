services:
  ebench-man:
    container_name: ebench-man
    image: memadapt/ebench-man:latest
    build:
      context: ..
      dockerfile: Docker/Dockerfile
      args:
        CUDA_VERSION: ${CUDA_VERSION:-11.8.0}
        NVIDIA_VERSION: ${NVIDIA_VERSION:-520.61.05}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=all
      - DISPLAY=${DISPLAY:-:4}
      # Force software OpenGL — bypasses broken Intel iris driver on Arrow Lake
      - LIBGL_ALWAYS_SOFTWARE=1
      - MESA_LOADER_DRIVER_OVERRIDE=swrast
      # Tell Qt to use software OpenGL path (prevents crash on GL context teardown)
      - QT_OPENGL=software
      # Suppress XCB BadAccess / XInput2 noise from Qt xcb plugin
      - QT_LOGGING_RULES=*.debug=false;qt.qpa.*=false
      - OPENAI_API_KEY="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"
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - ..:/opt/embodiedbench
    tty: true
    stdin_open: true

# config.yaml
defaults:
  - _self_

env: null
model_name: null
model_type: null
down_sample_ratio: null
language_only: null
eval_sets: null
chat_history: null
n_shots: null
multiview: null
detection_box: null
multistep: null
resolution: null
exp_name: null
visual_icl: null
tp: null
log_level: null
# --- Dual-Critic ---
use_critic: null            # set to True to enable the dual-critic module


# --- Memory (optional) ---
# Uncomment and adjust to enable memory during evaluation.
memory:
  enabled: true
  use_embeddings: true
  embedding_model: "bge-large-en-v1.5"   # or "nomic-embed-text-v1.5"
  storage_dir: "alfred_memory_store"
  top_k_per_memory: 5
  spatial_enabled: true
  temporal_enabled: true
  episodic_enabled: true
  semantic_enabled: true

# --- Memory Adapter config (used when mode is adapted_planner / adapted_planner_critic) ---
memory_adapter:
  enabled: true
  model_name_or_path: "embodiedbench/memory_adapter/models/Qwen3-14B"
  device: "auto"
  torch_dtype: "bfloat16"   # Qwen3-14B is a standard BF16 model
  max_new_tokens: 2048
  temperature: 0.0
  do_sample: false
  enable_thinking: false    # set to true to surface Qwen3 chain-of-thought <think> blocks
  trust_remote_code: true
  load_in_4bit: false
  load_in_8bit: false
  # API backend — when api_model is non-empty, no model is loaded locally and all
  # generation calls are forwarded to the specified OpenAI-compatible server.
  api_model: ""             # e.g. "gpt-4o" or "qwen3-14b-adapter" (lmdeploy/vLLM)
  api_key: ""               # API key; use "EMPTY" for local servers; falls back to OPENAI_API_KEY env var
  api_base_url: ""          # e.g. "http://localhost:8000/v1" for a local lmdeploy/vLLM server

# --- Experiment / Ablation mode ---
# Controls which memory components are activated and where they are attached.
# Valid modes:
#   none                  - no memory at all (pure planner baseline)
#   raw_planner           - memory only, attached to planner
#   raw_planner_critic    - memory only, attached to planner + critic
#   adapted_planner       - memory + MemoryAdapter, planner only
#   adapted_planner_critic- memory + MemoryAdapter, planner + critic (full system)
# When this block is absent the system falls back to backward-compatible behaviour
# (creates memory+adapter and attaches both to planner and critic).
memory_experiment:
  mode: adapted_planner              # change to run different ablations
  log_memory_outputs: true
  log_adapter_outputs: true
  log_dir: "./alfred_memory_logs"
  save_training_records: true

# --- Video / logging ---
record_video: null          # set to True to record annotated episode videos
video_fps: null             # frames-per-second for saved episode videos
critic_n_shot: null        # examples for critic prompt; null → falls back to n_shots

# --- Weights & Biases ---
# Set wandb.enabled=true (or override via CLI: wandb.enabled=true wandb.project=myproject)
wandb:
  enabled: false
  project: "memadapt"
  entity: null              # your W&B username or team; null = W&B default
  group: null               # run group for organising sweeps / ablations
  tags: []                  # list of string tags, e.g. [alfred, grpo]
  log_model: false          # upload model checkpoints as W&B artifacts
  log_examples: true        # upload qualitative examples to W&B Tables
  mode: "online"            # "online" | "offline" | "disabled"
  save_code: true
  resume: false
  run_id: null              # set to resume a specific W&B run
